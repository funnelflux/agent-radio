name: CI

on:
  push:
    branches:
      - master
      - develop
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build current platform
        run: go build -o ./bin/agent-radio ./cmd/agent-radio

  release-artifacts:
    name: Build Release Artifacts
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Build release artifacts
        run: VERSION="${GITHUB_REF_NAME:-dev}" scripts/build-release.sh

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agent-radio-release-artifacts
          path: |
            dist/agent-radio-linux-amd64
            dist/agent-radio-linux-arm64
            dist/agent-radio-darwin-amd64
            dist/agent-radio-darwin-arm64
            dist/agent-radio-shell-helpers.sh
            dist/checksums.txt

      - name: Attest release artifacts
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: |
            dist/agent-radio-linux-amd64
            dist/agent-radio-linux-arm64
            dist/agent-radio-darwin-amd64
            dist/agent-radio-darwin-arm64
            dist/agent-radio-shell-helpers.sh
            dist/checksums.txt

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/agent-radio-linux-amd64
            dist/agent-radio-linux-arm64
            dist/agent-radio-darwin-amd64
            dist/agent-radio-darwin-arm64
            dist/agent-radio-shell-helpers.sh
            dist/checksums.txt
